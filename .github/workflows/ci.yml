name: CI – Epistemic Honesty Enforcement

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate Registry
        run: python scripts/validate_registry.py

  lean-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean + Lake
        run: |
          curl -L https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: lake build (P8 physical gap target)
        run: lake build YangMills.P8_PhysicalGap.BalabanToLSI
      - name: Confirm zero sorry
        run: |
          count=$(grep -rn "sorry" YangMills/ --include="*.lean" | grep -v "^\s*--" | wc -l)
          echo "sorry count: $count"
          if [ "$count" -gt 0 ]; then
            grep -rn "sorry" YangMills/ --include="*.lean" | grep -v "^\s*--"
            exit 1
          fi
          echo "OK: zero sorry confirmed"
