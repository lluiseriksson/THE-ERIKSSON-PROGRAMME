name: Validate repository control plane

on:
  push:
    branches: [ main ]
    paths:
      - "pytest.ini"
      - "project-state.json"
      - "tests/**"
      - "scripts/source_citations.py"
      - "scripts/source_db.py"
      - "scripts/validate_project_state.py"
      - "scripts/validate_documentation_state.py"
      - "scripts/validate_run_manifests.py"
      - "scripts/validate_changed_run_coverage.py"
      - "scripts/**transcript*.txt"
      - "scripts/**output*.txt"
      - "scripts/test_monotone_nodes.py"
      - "scripts/cascade*.py"
      - "run-manifests/**"
      - "docs/PROJECT-STATE.md"
      - "README.md"
      - "CURRENT-STATE.md"
      - "ROADMAP.md"
      - "HORIZON.md"
      - "HYPOTHESIS_FRONTIER.md"
      - "README-FOR-NEXT-MODEL.md"
      - "SATELLITES.md"
      - "docs/dashboard/**"
      - "docs/incidents/**"
      - "docs/source-citations/**"
      - "docs/source-db/**"
      - ".github/workflows/control-plane.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "pytest.ini"
      - "project-state.json"
      - "tests/**"
      - "scripts/source_citations.py"
      - "scripts/source_db.py"
      - "scripts/validate_project_state.py"
      - "scripts/validate_documentation_state.py"
      - "scripts/validate_run_manifests.py"
      - "scripts/validate_changed_run_coverage.py"
      - "scripts/**transcript*.txt"
      - "scripts/**output*.txt"
      - "scripts/test_monotone_nodes.py"
      - "scripts/cascade*.py"
      - "run-manifests/**"
      - "docs/PROJECT-STATE.md"
      - "README.md"
      - "CURRENT-STATE.md"
      - "ROADMAP.md"
      - "HORIZON.md"
      - "HYPOTHESIS_FRONTIER.md"
      - "README-FOR-NEXT-MODEL.md"
      - "SATELLITES.md"
      - "docs/dashboard/**"
      - "docs/incidents/**"
      - "docs/source-citations/**"
      - "docs/source-db/**"
      - ".github/workflows/control-plane.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Source metadata records historical commit anchors.  A shallow
          # checkout turns valid ancestors into false "missing" results.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install pytest

      - name: Validate committed run manifests
        run: python scripts/validate_run_manifests.py

      - name: Require manifests for changed computational artifacts
        env:
          CHANGE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python scripts/validate_changed_run_coverage.py --base "$CHANGE_BASE"

      - name: Validate canonical project state
        run: python scripts/validate_project_state.py

      - name: Validate public documentation state
        run: python scripts/validate_documentation_state.py

      - name: Run control-plane tests
        run: python -m pytest -q
