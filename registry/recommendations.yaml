- id: REC-COWORK-DISPATCHER-TRIGGER-VERIFICATION-001
  author: Cowork
  status: OPEN
  priority: 3
  title: scripts/agent_next_instruction.py should verify auto-promote trigger conditions
    before promoting FUTURE → READY for tasks with explicit triggers
  recommendation: 'COWORK-AUDIT-CLAY-F3-COUNT-LEAF-DELETION-001 was promoted from
    FUTURE to READY at ~15:00 by the dispatcher even though its explicit trigger (Codex
    lands a v2.52+ AXIOM_FRONTIER entry OR a leaf/deletion-order theorem in LatticeAnimalCount.lean)
    has not fired. The dispatcher currently promotes FUTURE tasks by priority/age
    fallback when no Cowork READY tasks exist. For tasks whose `notes:` field contains
    an explicit auto-promote directive (phrase pattern: "auto-promote when X" or "auto-promote
    FUTURE → READY when X"), the dispatcher should parse X and verify it before promoting.
    Specific triggers to support: (a) `grep <pattern> <file>` returning non-empty;
    (b) AXIOM_FRONTIER entry `# v<X.Y.Z>` with version `>= <threshold>`; (c) registry/agent_history.jsonl
    having a recent matching event. Fallback to priority/age dispatch only for tasks
    WITHOUT explicit triggers.

    '
  reason: 'Premature dispatch wastes Cowork cycles on un-completable audits and, without
    honesty discipline, could lead a less-careful agent to mark tasks DONE without
    evidence. The dispatcher should help enforce the AGENTS.md §3.2 no-trust-without-evidence
    rule rather than route around it.

    '
  risk_if_ignored: 'Cowork wastes cycles on premature audits; if a future agent is
    less disciplined than the current Cowork (which refused to close the audit), tasks
    could be marked DONE without evidence, replicating the overclaim pattern.

    '
  files_affected:
  - scripts/agent_next_instruction.py
  - dashboard/codex_autocontinue_snapshot.py (mirrored)
  - registry/agent_tasks.yaml (notes: field parsing convention)
  converts_to_task: CODEX-DISPATCHER-TRIGGER-VERIFICATION-001 (to be created when
    Lluis ratifies)
  validation: 'After implementation, COWORK-AUDIT-CLAY-F3-COUNT-LEAF-DELETION-001
    (currently FUTURE) does NOT auto-promote until either grep finds the leaf/deletion-order
    theorem OR AXIOM_FRONTIER gains a v2.52+ entry. Dispatcher logs a [TRIGGER_NOT_FIRED]
    event when it considers a FUTURE task but the trigger is not satisfied.

    '
