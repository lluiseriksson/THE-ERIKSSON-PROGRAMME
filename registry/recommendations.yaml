  - UNCONDITIONALITY_LEDGER.md
  converts_to_task: CODEX-VACUITY-RULES-CONSOLIDATION-001 (READY priority 4)
  validation: 'After implementation, LEDGER Tier 1 + Tier 2 tables have a vacuity_flag
