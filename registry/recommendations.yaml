  status: OPEN
  priority: 2
  title: Add vacuity_flag column to UNCONDITIONALITY_LEDGER.md Tier 1 + Tier 2 tables
  recommendation: 'COWORK-VACUITY-PATTERN-TRACKER-001 escalation (audit 2026-04-26T14:30:00Z)
    surfaced 5-7+ structurally distinct vacuity-pattern instances across the project
    but only 2 are explicitly titled §1.X caveat rows in KNOWN_ISSUES.md. External
    readers reading only the LEDGER cannot distinguish vacuous-FORMAL_KERNEL from
    genuine-FORMAL_KERNEL rows. Add a vacuity_flag column to LEDGER Tier 1 + Tier
    2 tables with values: none, caveat-only, vacuous-witness, trivial-group, zero-family,
    anchor-structure, trivial-placeholder. Makes the vacuity status machine-readable
    rather than buried in evidence-column prose.

    '
