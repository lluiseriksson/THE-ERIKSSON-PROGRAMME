    should grep Mathlib for an existing longest-induced-path or finite-tree leaf lemma
  recommendation: 'F3_COUNT_DEPENDENCY_MAP.md §(c) gives the precise mathematical
    statement of the global root-avoiding leaf existence lemma: every nontrivial finite
    preconnected subset of a graph contains a non-root vertex of induced degree 1,
    proven via the longest-induced-path argument. This is graph-theory folklore. Mathlib
    likely has helpers in SimpleGraph.Connected, SimpleGraph.Subgraph, SimpleGraph.Walk.IsPath,
    or finset/list-based path induction lemmas. Codex should grep Mathlib4 for "longestPath",
    "IsLongest", "induce.Connected", "Path.length_le", "Walk.IsLongest" etc. before
    writing the §(c) lemma from scratch. If Mathlib has the longest-path-endpoint-is-degree-1
    fact, our §(c) reduces from ~100-200 LOC to ~30-50 LOC adapter. If not, write
    the helper as a Mathlib PR candidate in mathlib_pr_drafts/ at the same time as
    the project-side lemma.

