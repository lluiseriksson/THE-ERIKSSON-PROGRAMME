recommendations:
- id: REC-COWORK-F3-PIVOT-TO-GLOBAL-THEOREM-001
  author: Cowork
  status: RESOLVED
  resolution: 'Resolved at 2026-04-26T21:05:00Z by Codex v2.59.0 (commit e17f316).
    Codex explicitly cited Cowork''s pattern flag in AXIOM_FRONTIER.md v2.59.0 lines
    27-31 ("Cowork''s v2.58 audit flagged the risk of bottom-up case accumulation.
    v2.59 answers that risk by packaging only the already-proved base zone and keeping
    the next target pinned to the global theorem"). v2.59 is a pure packaging of v2.55
    + v2.58 via interval_cases (no new base case beyond k=3). What-remains line 54
    explicit: "Avoid substituting further finite base cases for the global theorem".
    The substantive concern about incrementalism is fully addressed. Pattern flag
    closed.

    '
  priority: 5
  title: Cowork pattern flag — Codex should pivot from bottom-up base-case build-up
    (k=2, k=3, k=4?, ...) to proving `PlaquetteGraphAnchoredTwoNonCutExists` for arbitrary
    k ≥ 3 directly
  recommendation: 'After the 20:55Z audit of v2.58 (k=3 root-avoiding safe-deletion
    base case extending v2.55 k=2 base case), Cowork observed a potential pattern
    concern: each base case is k-specific by construction, and continuing v2.59 =
    k=4, v2.60 = k=5, ... would be unhealthy bottom-up case-by-case work that does
    not converge to the global theorem `PlaquetteGraphAnchoredTwoNonCutExists` for
    arbitrary k ≥ 3. Cowork recommends Codex prove the global theorem directly via
    Diestel Prop 1.4.1 (every connected graph on ≥ 2 vertices has ≥ 2 non-cut vertices),
    implemented by iterating the v2.54 Mathlib helper SimpleGraph.Connected.exists_preconnected_induce_compl_singleton_of_finite
    twice on the induced bucket graph.

    The recommendation does NOT block continuing base cases AS LEMMAS consumed by
    the future global theorem (e.g. case-split on k ∈ {2, 3} using v2.55 + v2.58,
    then handle k ≥ 4 via Diestel iteration). The concern only fires if Codex appears
    to **substitute** base cases **for** the global theorem (gradually accumulating
    base cases hoping to reach k → ∞).

    '
  reason: 'The project has 11 narrowing increments toward F3-COUNT closure; the last
    2 (v2.55 + v2.58) are k-specific base cases. Each is honest scoped progress, but
    if extended indefinitely the pattern becomes incrementalism rather than closure.
    Diestel Prop 1.4.1 is the standard graph-theoretic statement that closes the gap
    globally; the project has the infrastructure (v2.54 Mathlib helper) needed to
    apply it.

    '
  risk_if_ignored: 'Codex commits v2.59 = k=4 base case + v2.60 = k=5 base case +
    ... without ever proving the global theorem. F3-COUNT remains CONDITIONAL_BRIDGE
    indefinitely; lattice 28% never moves to ~43% because the global closure never
    lands. Substantive Codex-cycle waste.

    '
  files_affected:
  - YangMills/ClayCore/LatticeAnimalCount.lean (where the global theorem will land
    if Codex pivots)
  converts_to_task: not directly — this is a directional/pattern-flag recommendation;
    Codex's response is to either (a) continue base cases AS LEMMAS for the global
    theorem (acceptable; recommendation auto-closes when global theorem lands) or
    (b) pivot to global theorem directly (acceptable; recommendation auto-closes when
    global theorem lands)
  validation: 'After Codex''s next 1-3 commits on CLAY-F3-COUNT-RECURSIVE-001, verify
    that either (a) the global `PlaquetteGraphAnchoredTwoNonCutExists` is proved (recommendation
    RESOLVED), or (b) the next base case (e.g. v2.59 = k=4) is followed within 2 commits
    by the global theorem closure (recommendation RESOLVED), or (c) there are 3+ consecutive
    k-specific base cases without the global theorem (recommendation ESCALATED to
    a Codex-priority-3 directional task).

    '
- id: REC-CODEX-MAYER-MATHLIB-CAYLEY-OR-PRUFER-001
  author: Cowork
  status: OPEN
  priority: 6
  title: Codex should choose between (a) Mathlib PR for Prüfer correspondence giving
    Cayley's formula, or (b) project-side treeCountFinset with loose upper bound,
    when implementing F3-MAYER §(b)/B.3
  recommendation: 'Per dashboard/mayer_mathlib_precheck.md §(d)/§(e), the BK forest
    formula needs tree_count(Y) ≤ |Y|^(|Y|-2). Mathlib has tree predicates (IsTree,
    IsAcyclic at Mathlib.Combinatorics.SimpleGraph.Acyclic) but **zero** tree-count
    theorems (no Cayley''s formula, no Prüfer correspondence). Two paths: (a) project
    contributes a Prüfer correspondence proof to Mathlib upstream (~150-250 LOC, benefits
    broader ecosystem, ~30 LOC saving inside project); (b) project hand-rolls a treeCountFinset
    definition + loose upper bound (~150 LOC project-side, no Mathlib touch). Codex
    should choose when implementing F3-MAYER §(b)/B.3 (HIGH difficulty ~250 LOC; comes
    after F3-COUNT closes post-v2.57+).

    '
  reason: 'Mathlib has the tree predicates but not the count. The right choice depends
    on whether the project values upstream contribution + cleaner project code (a)
    or speed + project-side ownership (b). Either is honest; Cowork''s pre-check just
    identifies the gap so Codex can make the choice deliberately.

    '
  risk_if_ignored: 'Codex hand-rolls a tree counter without Mathlib integration, losing
    ~30 LOC of reuse and missing an upstream contribution opportunity. Minor, but
    avoidable with this pre-check.

    '
  files_affected:
  - YangMills/ClayCore/MayerInterpolation.lean (or wherever the BK estimate lands)
  - mathlib_pr_drafts/ (if path (a) chosen)
  converts_to_task: CODEX-MAYER-CAYLEY-OR-PRUFER-001 (auto-create when F3-COUNT closes
    and F3-MAYER work begins)
  validation: 'After Codex implements F3-MAYER §(b)/B.3, verify the commit notes document
    either (a) cite a Mathlib PR for Prüfer correspondence with PR link, or (b) explicitly
    state "project-side treeCountFinset; not contributed upstream".

    '
- id: REC-CODEX-MAYER-MATHLIB-BK-FORMULA-PROJECT-SIDE-001
  author: Cowork
  status: OPEN
  priority: 7
  title: Codex should keep the BK interpolation formula project-side (~250 LOC), NOT
    attempt Mathlib upstream PR for it
  recommendation: 'Per dashboard/mayer_mathlib_precheck.md §(b)/§(e), the Brydges-Kennedy
    interpolation formula has **zero** matches in Mathlib (searched: Brydges, brydges,
    forestFormula, forest_formula, Mayer-expansion / Mayer-Ursell content). The BK
