    when implementing F3-MAYER §(b)/B.3.

    '
  reason: 'A Mathlib PR for BK is large, specialized, and slow. The project doesn''t
    benefit from being the upstream maintainer. Project-side ownership matches the
    BLUEPRINT_F3Mayer planning estimates and the F3 timeline.

    '
  risk_if_ignored: 'Codex spends cycles attempting a Mathlib PR for BK that is not
    accepted upstream within the F3-MAYER timeline. Substantive Codex-cycle waste
    if the path is attempted.

    '
  files_affected:
