- id: REC-CODEX-MAYER-B4-HYPOTHESIS-TIGHTEN-001
  author: Cowork
  status: RESOLVED
  resolved_at: '2026-04-27T18:05:00Z'
  resolution: 'Resolved by CODEX-MAYER-B4-HYPOTHESIS-TIGHTEN-DOC-001: F3_MAYER_DEPENDENCY_MAP.md
    now states the B.4 plaquetteFluctuationNorm_sup_le hypothesis as β < 1 / (2 *
    N_c), and the B.6 witness summary uses the same corrected Mayer-side hypothesis
    while preserving the stronger final F3-COMBINED regime β < 1 / (28 * N_c). Documentation/spec
    repair only; no F3-MAYER status or percentage moved.'
  priority: 7
  created_at: '2026-04-27T04:05:00Z'
  last_referenced_at: '2026-04-27T08:35:00Z'
  last_referenced_in: dashboard/f3_mayer_deliverables_index.md (section e — Carried-over
    hypothesis flag and recommendations table) under COWORK-F3-MAYER-DELIVERABLES-INDEX-001;
    also CLAY_HORIZON.md v5 appendix (vii) under COWORK-CLAY-HORIZON-V5-REFRESH-001
  source_task: COWORK-F3-MAYER-B4-SCOPE-001
  source_artifact: dashboard/f3_mayer_b4_scope.md (section c)
  recommendation: 'When implementing F3-MAYER §(b)/B.4 plaquetteFluctuationNorm_sup_le,
    Codex should use the hypothesis `β < 1/(2 * N_c)` rather than the F3_MAYER_DEPENDENCY_MAP.md
    proposed `β < Real.log 2 / N_c`. The proposed hypothesis is too weak: the proof
    body requires `exp(2βN_c) − 1 ≤ 4βN_c`, equivalently `exp(y) − 1 ≤ 2y`, which
    holds for `y ≤ ~1.256` (the unique positive root of `exp(y) = 1 + 2y`). Under
    the proposed `β < log(2)/N_c`, `y < 2 log 2 ≈ 1.386 > 1.256`, so the bound fails
    for `β ∈ (0.628/N_c, log(2)/N_c)`. Concretely at `β = log(2)/N_c`: `exp(2βN_c)
    − 1 = 4 − 1 = 3` while `4βN_c = 4 log 2 ≈ 2.77`, so the bound fails by ~8%. Under
    the corrected `β < 1/(2 N_c)`: `y < 1`, comfortably within the validity range.
    The project''s actual small-β regime is `β < 1/(28 N_c)` (per F3-COMBINED LEDGER
    row), which is much smaller than `1/(2 N_c)` and well within the bound''s validity
    range. Either form is sufficient for downstream B.5/B.6 consumption.'
  rationale: F3_MAYER_DEPENDENCY_MAP.md lines 209-219 propose `β < Real.log 2 / N_c`
    in the signature and `for β N_c < 1/2` in the proof-body comment, which is internally
    inconsistent (`β < log(2)/N_c` does not imply `β N_c < 1/2`; the implication is
    only `β N_c < log 2 ≈ 0.693 > 0.5`). Cowork's scope walks through the algebra-of-exponentials
    derivation and finds the hypothesis-strength gap. Recommendation is purely about
    the hypothesis statement; the proof body is correct as written.
  risk_if_ignored: Codex implements B.4 with the dependency-map signature, gets a
    Lean type error or false-claim attempt at `β = log(2)/N_c`, and either spends
    time re-proving with corrected hypothesis (medium cost) or commits a false theorem
    (low likelihood since Lean would catch the gap, but possible if the proof avoids
    the boundary case). Pre-flagging saves Codex one full implementation cycle.
  next_action: Codex updates F3_MAYER_DEPENDENCY_MAP.md lines 209-212 to use `β <
    1 / (2 * N_c)` (or the project's `β < 1 / (28 * N_c)`); when implementing B.4,
    use the corrected hypothesis directly.
